<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1 class="logo">MeuSite</h1>
            <ul class="nav-links">
                <li><a href="#home">Início</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <h2>Bem-vindo ao MeuSite</h2>
            <p>Um site simples servido via Nginx em Docker.</p>
            <button id="btnContador">Cliques: <span id="contador">0</span></button>
        </section>

        <section id="sobre" class="sobre">
            <h2>Sobre</h2>
            <p>Este é um exemplo de site estático com HTML, CSS e JavaScript.</p>
        </section>

        <section id="contato" class="contato">
            <h2>Contato</h2>
            <form id="formContato">
                <input type="text" id="nome" placeholder="Seu nome" required>
                <input type="email" id="email" placeholder="Seu email" required>
                <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
                <button type="submit">Enviar</button>
            </form>
            <p id="resposta"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MeuSite. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
