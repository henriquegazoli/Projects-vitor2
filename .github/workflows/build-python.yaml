name: Build Docker image - python

on:
  push:
    branches:
      - main
    paths:
      - 'aplicacao-python/**'  
  pull_request:
    branches:
      - main
    paths:
      - 'aplicacao-python/**'   
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest ### maquina virtual para rodar o processo de build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildar a imagem docker
        run: |
          cd aplicacao-python
          docker build -t minha-imagem-python .

      - name: mostrar detalhes da imagem
        run: |
          echo "Imagem buildada com sucesso!"
          docker images minha-imagem-python
          docker inspect minha-imagem-python          