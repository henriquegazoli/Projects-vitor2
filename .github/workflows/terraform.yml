name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'Terraform/**'
      - '.github/workflows/deploy-terraform.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      name: Checkout code
        uses: actions/checkout@v2
      
      name: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      
      name: Fazer verificacao da plataforma
        working-directory:./terrraform
        run |
         cd terraform 
         terraform init

      name: Terraform Plan
        working-directory:./terrraform
        run |
        cd terraform 
        terraform plan

      name: Terraform Apply
        run |
        cd terraform 
        terraform apply -auto-approve
       
       
         


       





      